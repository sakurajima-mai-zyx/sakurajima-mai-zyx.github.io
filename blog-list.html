<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>学术记录 | 张宇轩的网站</title>
    <style>
        :root{
            --ink:#18211f;
            --muted:#68736d;
            --line:#dfe7e2;
            --paper:#fbfcf8;
            --teal:#197b71;
            --rose:#b84d52;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            background:var(--paper);
            color:var(--ink);
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
        }
        .wrap{
            width:min(820px,calc(100% - 36px));
            margin:0 auto;
            padding:48px 0 80px;
        }
        .back{
            color:var(--teal);
            text-decoration:none;
            margin-bottom:38px;
            display:inline-block;
            font-weight:700;
        }
        h1{
            margin:0 0 12px;
            font-size:36px;
            letter-spacing:0;
        }
        .intro{
            margin:0 0 34px;
            color:var(--muted);
            line-height:1.8;
            font-size:17px;
        }
        .item{
            display:grid;
            grid-template-columns:110px 1fr;
            gap:18px;
            color:var(--ink);
            text-decoration:none;
            padding:20px 0;
            border-top:1px solid var(--line);
        }
        .item:last-child{border-bottom:1px solid var(--line)}
        .date{
            color:var(--rose);
            font-weight:800;
        }
        .title{
            display:block;
            font-weight:800;
            margin-bottom:6px;
        }
        .note{
            color:var(--muted);
            line-height:1.6;
            font-size:15px;
        }
        .item:hover .title{color:var(--teal)}
        @media (max-width:620px){
            .wrap{width:min(100% - 28px,820px);padding-top:34px}
            h1{font-size:30px}
            .item{grid-template-columns:1fr;gap:8px}
        }
    </style>
</head>
<body>
    <main class="wrap">
        <a href="index.html" class="back">← 返回主页</a>
        <h1>学术记录</h1>
        <p class="intro">旧内容已经清空。这里从 2026.6.29 开始，记录正式写学术型网站后的内容。</p>

        <a href="blogs/2026.6.30.html" class="item">
            <span class="date">2026.6.30</span>
            <span>
                <span class="title">2026.6.30 学术记录</span>
                <span class="note">待补充。</span>
            </span>
        </a>
        <a href="blogs/2026.6.29.html" class="item">
            <span class="date">2026.6.29</span>
            <span>
                <span class="title">正式开始写学术型网站</span>
                <span class="note">今天考完了高等数学与热统，开始正式写学术型网站。</span>
            </span>
        </a>
    </main>
</body>
</html>
