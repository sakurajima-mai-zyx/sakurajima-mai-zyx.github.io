name: Daily diary

on:
  schedule:
    - cron: "10 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-diary-entry:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Add diary entry
        run: python tools/add_diary_entry.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- blog-list.html blogs; then
            echo "No diary changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog-list.html blogs
          git commit -m "Add daily diary entry"
          git push
