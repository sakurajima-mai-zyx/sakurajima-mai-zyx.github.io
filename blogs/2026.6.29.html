<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>2026.6.29 学术记录</title>
    <style>
        :root{
            --ink:#18211f;
            --muted:#68736d;
            --paper:#fbfcf8;
            --teal:#197b71;
            --amber:#c6742f;
        }
        *{box-sizing:border-box}
        body{
            margin:0;
            background:var(--paper);
            color:var(--ink);
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
        }
        .wrap{
            width:min(820px,calc(100% - 36px));
            margin:0 auto;
            padding:48px 0 82px;
        }
        .back{
            color:var(--teal);
            text-decoration:none;
            display:inline-block;
            margin-bottom:36px;
            font-weight:700;
        }
        .date{
            color:var(--amber);
            font-weight:800;
            margin-bottom:16px;
        }
        p{
            margin:0;
            color:var(--ink);
            line-height:2;
            font-size:22px;
        }
        @media (max-width:620px){
            .wrap{width:min(100% - 28px,820px);padding-top:34px}
            p{font-size:19px}
        }
    </style>
</head>
<body>
    <main class="wrap">
        <a href="../blog-list.html" class="back">← 返回学术记录</a>
        <div class="date">2026.6.29</div>
        <p>今天考完了高等数学与热统，开始正式写学术型网站。</p>
